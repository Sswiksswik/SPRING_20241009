<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>블로그 게시판(new)</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">

    <h1 class="mt-5">블로그 게시판(new)</h1>
<!-- 게시글 검색창 -->
<form th:action="@{/board_list}" method="get" class="mt-4">
<div class="input-group">
<input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="검색어 입력...">
<button type="submit" class="btn btn-primary">검색</button>
</div>
</form>
<!-- 게시글 추가 폼 -->
<div class="mt-4">
<h2>게시글 추가(제목과 내용 입력)</h2>
<form th:action="@{/api/boards}" method="post" name="content">
<div class="form-group">
<label for="title">제목:</label>
<input type="text" class="form-control" id="title" name="title" required>
</div>
<div class="form-group">
<label for="content">내용:</label>
<textarea class="form-control" id="content" name="content" rows="5" required></textarea>
</div>
<button type="submit" class="btn btn-primary">글 저장하기</button>
        <tr th:each="article : ${articles}">
            <td th:text="${article.id}"></td>
            
            <td>
                <a th:href="@{/article_edit/{id}(id=${article.id})}" th:text="${article.title}"></a>
            </td>
            <td>
                <a th:href="@{/board_view/{id}(id=${board.id})}">
                    <span th:text="${board.title}"></span>
                </a>
            </td>
        <td th:text="${article.user}"></td>
            
            <td th:text="${article.newdate}"></td>
            
            <td th:text="${article.count}"></td>
            
            <td th:text="${article.likec}"></td>
        </tr>
    </tbody>
    <!-- 글쓰기 페이지 -->
<table class="table table-bordered">
<tbody>
<tr>
<td><!-- 글쓰기 버튼 -->
<a class="btn btn-warning" th:href="@{/board_write}">글쓰기</a>
</td>
</tr>
</tbody>
</table>

            <!-- <tbody>
                <tr th:each="article : ${articles}">
                    <td th:text="${article.id}">1</td>
                    <td th:text="${article.title}">게시글 제목입니다.</td>
                    <td th:text="${article.content}">게시글 내용이 여기에 들어갑니다.</td>
                    <td>
                        <a class="btn btn-warning btn-sm"
                           th:href="@{/article_edit/{id}(id=${article.id})}">수정</a>
                        <a class="btn btn-danger btn-sm"
                           th:href="@{/article_delete/{id}(id=${article.id})}">삭제</a>
                    </td>
                </tr>
            </tbody> -->
        </table>
    </div>

    <hr class="my-5">arning" th:href="@{/article_edit/{id}(id=${article.id})}">삭제</a>

</div>
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
        <li class="page-item" 
            th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" 
               th:href="@{/board_list(page=${currentPage - 1}, keyword=${keyword})}" 
               aria-label="Previous">
                <span aria-hidden="true">&laquo;</span>
            </a>
        </li>
        
        <li class="page-item" 
            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
            th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link"
               th:href="@{/board_list(page=${i}, keyword=${keyword})}" 
               th:text="${i + 1}">1</a>
        </li>
        
        <li class="page-item" 
            th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
            <a class="page-link" 
               th:href="@{/board_list(page=${currentPage + 1}, keyword=${keyword})}" 
               aria-label="Next">
                <span aria-hidden="true">&raquo;</span>
            </a>
        </li>
    </ul>
</nav>
